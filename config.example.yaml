# Voice Typing Configuration File (V2 - Layered Intelligence)
# Copy to ~/.voice-typing/config.yaml and adjust as needed
# Edit this file directly or use the Settings UI (right-click overlay)

# ============================================================================
# Speech-to-Text Engine Configuration
# ============================================================================
stt:
  # Backend implementation
  # whisper: faster-whisper (default)
  # nemo: NVIDIA NeMo (required for canary-qwen-2.5b)
  backend: whisper

  # V2 default: large-v3 on CUDA for maximum accuracy
  # canary-qwen-2.5b: NVIDIA Canary-Qwen-2.5B via NeMo (English-only, with punctuation/caps)
  #   Install: pip install "vype[canary]"  (see pyproject optional extras)
  # tiny: fastest, lowest accuracy (39M params)
  # base: good for CPU-only machines (74M params) 
  # small: better accuracy, slower (244M params)
  # medium: high accuracy, requires GPU (769M params)
  # large-v2/large-v3: best accuracy, requires NVIDIA GPU with CUDA
  model: large-v3
  
  # Device for inference
  # cuda: V2 default — requires NVIDIA GPU with CUDA drivers installed
  # auto: automatically select GPU if available, fallback to CPU
  # cpu: force CPU (significantly slower, use small/base model)
  device: cuda
  
  # Language for transcription (en = English)
  # For other languages, use ISO 639-1 codes (es, fr, de, etc.)
  language: en
  
  # Compute precision
  # float16: max quality, ~3.1GB VRAM (recommended for RTX 3080 and later)
  # int8_float16: int8 weights + float16 activations, ~1.6GB VRAM (use if VRAM is tight)
  # float32: CPU-compatible, slowest
  # int8: CPU-only
  compute_type: float16

# ============================================================================
# Audio Capture Configuration
# ============================================================================
audio:
  # Audio input device ID (null = system default)
  # Use Settings UI to see available devices
  device_id: null
  
  # Sample rate in Hz (Whisper expects 16000)
  sample_rate: 16000
  
  # Number of audio channels (1 = mono, 2 = stereo)
  channels: 1
  
  # V2: smaller chunks for lower VAD latency (0.1s = 100ms callbacks)
  chunk_duration: 0.1

# ============================================================================
# Voice Activity Detection (V2 - Silero VAD)
# ============================================================================
vad:
  # Enable Silero VAD pre-segmentation (strongly recommended)
  # When enabled, only confirmed speech frames are sent to Whisper
  enabled: true
  
  # VAD backend: silero (neural, recommended) or energy (legacy fallback)
  method: silero
  
  # Speech probability threshold [0.0-1.0]
  # Higher = less sensitive (misses quiet speech)
  # Lower = more sensitive (may include background noise)
  threshold: 0.4
  
  # Minimum speech duration to start a segment (ms)
  min_speech_duration_ms: 250
  
  # Silence gap that ends a segment (ms)
  # 800ms is the sweet spot — long enough to survive natural mid-sentence
  # pauses (300-500ms) without cutting the utterance short and forcing
  # Whisper to guess the final word from an incomplete phrase.
  min_silence_duration_ms: 800

# ============================================================================
# Brain Layer (V2 - Ollama LLM)
# ============================================================================
brain:
  # Enable the Ollama brain layer (requires Ollama running locally)
  # Install Ollama: https://ollama.ai
  # Pull model: ollama pull llama3.2
  enabled: true
  
  # Ollama server endpoint
  endpoint: http://localhost:11434
  
  # LLM model for intent routing and refinement
  # Recommended: llama3.2 (fast) or llama4-scout (higher quality)
  model: llama3.2
  
  # Timeout for LLM calls in seconds
  # Increase if you have a slower GPU or large model
  timeout_sec: 10.0
  
  # Rolling context window for keyword summarization (seconds)
  context_window_sec: 120.0
  
  # Maximum keywords in the Whisper initial_prompt
  context_max_keywords: 50
  
  # Feature toggles
  intent_routing_enabled: true   # Classify TRANSCRIPT / COMMAND / REFACTOR
  refinement_enabled: true       # LLM grammar cleaning via Refiner skill
  context_summarizer_enabled: true  # Rolling keyword injection into Whisper

# ============================================================================
# Punctuation Handling
# ============================================================================
punctuation:
  # Punctuation mode:
  # auto: Use Whisper's built-in punctuation only
  # manual: Voice commands only (disable Whisper's punctuation)
  # hybrid: Both (manual voice commands override auto punctuation)
  mode: hybrid
  
  # Automatically capitalize first letter of sentences
  auto_capitalize: true
  
  # Manual punctuation voice commands
  # You can enable/disable individual commands or customize patterns
  manual_commands:
    period:
      enabled: true
      pattern: "\\b(period|full stop)\\b"
      action: "."
      description: Insert period
    comma:
      enabled: true
      pattern: "\\b(comma)\\b"
      action: ","
      description: Insert comma
    question_mark:
      enabled: true
      pattern: "\\b(question mark)\\b"
      action: "?"
      description: Insert question mark
    exclamation_mark:
      enabled: true
      pattern: "\\b(exclamation mark|exclamation point)\\b"
      action: "!"
      description: Insert exclamation mark

# ============================================================================
# Voice Commands
# ============================================================================
commands:
  # Enable/disable all voice commands
  enabled: true
  
  # Built-in control commands
  new_line:
    enabled: true
    pattern: "\\b(new line|newline)\\b"
    action: "\\n"
    description: Insert line break
  
  stop_dictation:
    enabled: true
    pattern: "\\b(stop dictation|stop listening)\\b"
    action: "STOP"
    description: End recording session
  
  # Custom commands - add your own here!
  # Example: "insert email" -> your@email.com
  custom_commands: {}
    # my_email:
    #   enabled: true
    #   pattern: "\\b(insert email|my email)\\b"
    #   action: "your@email.com"
    #   description: Insert email address
    # my_signature:
    #   enabled: true
    #   pattern: "\\b(insert signature)\\b"
    #   action: "Best regards,\\nYour Name"
    #   description: Insert email signature

# ============================================================================
# User Interface Configuration
# ============================================================================
ui:
  # Show circular audio visualizer overlay
  show_visualizer: true
  
  # Visualizer size in pixels
  visualizer_size: 100
  
  # Visualizer opacity (0.0 = transparent, 1.0 = opaque)
  visualizer_opacity: 0.8
  
  # Initial visualizer position [x, y] from top-left
  # Position is saved when you drag the visualizer
  visualizer_position: [100, 100]
  
  # Start application minimized to tray
  start_minimized: true
  
  # Close to tray instead of exiting
  close_to_tray: true
  
  # Global hotkey (toggle dictation on/off)
  # Format: ctrl+shift+key, ctrl+alt+key, etc.
  # If this fails, app will try fallback hotkeys
  hotkey: ctrl+shift+space

# ============================================================================
# Text Output Configuration
# ============================================================================
output:
  # Primary method for inserting text
  # keyboard: Simulate keyboard typing (fast, works in most apps)
  # uia: UI Automation (slower, better compatibility with modern apps)
  # win32: Win32 API (fast, legacy apps)
  # clipboard: Clipboard paste (fastest, overwrites clipboard)
  primary_method: keyboard
  
  # Fallback methods if primary fails (tried in order)
  fallback_methods: [clipboard]
  
  # Typing speed in seconds per character (for keyboard method)
  # Lower = faster, but may cause issues in some apps
  typing_speed: 0.01
  
  # Prefer clipboard for text longer than this many characters
  # Reduces latency for long transcriptions
  prefer_clipboard_over_chars: 200

# ============================================================================
# Streaming and Segmentation
# ============================================================================
streaming:
  # Streaming mode
  mode: final_only
  
  # Segmentation method
  # vad: Silero VAD (V2 default — uses vad: section above)
  # energy: Legacy energy-threshold fallback
  segmentation: vad
  
  # Minimum segment length in seconds (used for energy fallback only)
  min_segment_sec: 0.5
  
  # Minimum silence to finalize segment (used for energy fallback only)
  min_silence_sec: 0.4
  
  # Energy threshold for silence (used only when segmentation: energy)
  energy_threshold: 0.015

# ============================================================================
# Whisper Decoding Parameters
# ============================================================================
decoding:
  # Beam size for beam search (higher = more accurate, slower)
  # 1 = greedy search (fastest)
  # 5 = default (good balance)
  # 10+ = maximum quality (slower)
  beam_size: 5
  
  # Temperature for sampling (0.0 = deterministic)
  # Higher values increase randomness
  temperature: 0.0
  
  # Do NOT condition on previous text — this is the primary guard against
  # Whisper echoing its own previous output as hallucinated repetitions.
  condition_on_previous_text: false

  # Discard segments whose average token log-probability falls below this.
  # -1.0 accepts everything; -0.4 filters out low-confidence guesses.
  log_prob_threshold: -0.4

  # Beam search patience multiplier (1.0 = standard, 2.0 = explore more candidates)
  patience: 2.0

  # Penalise repeated tokens — reduces n-gram repetition loops (1.0 = off)
  repetition_penalty: 1.1

# ============================================================================
# Logging Configuration
# ============================================================================
# Logging level: DEBUG, INFO, WARNING, ERROR
log_level: INFO

# Log file path (null = no file logging, only console)
# Example: C:\Users\YourName\.voice-typing\voice-typing.log
log_file: null
